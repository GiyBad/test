name: test
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install
        run: pip install flask pyngrok
      - name: Run
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTH }}
        run: |
          python app.py &
          sleep 21600
